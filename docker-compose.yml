version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: trafficshield-postgres
    environment:
      POSTGRES_DB: trafficshield
      POSTGRES_USER: trafficshield
      POSTGRES_PASSWORD: trafficshield
    ports:
      - "5432:5432"
    volumes:
      - trafficshield_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: trafficshield-redis
    ports:
      - "6379:6379"

volumes:
  trafficshield_postgres_data: