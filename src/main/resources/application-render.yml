server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:h2:mem:trafficshield;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver

  sql:
    init:
      mode: always
      schema-locations: classpath:schema-render.sql

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

trafficshield:
  appBaseUrl: http://localhost:${PORT:8080}